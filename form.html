<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Windows Mail Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --win-bg: #c0c0c0;
            --win-blue: #000080;
            --win-border-light: #ffffff;
            --win-border-dark: #808080;
            --accent-purple: #800080;
            --accent-cyan: #00ffff;
        }

        body {
            background-color: #000;
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            font-family: 'VT323', monospace;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .top-nav {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            margin-bottom: 50px;
        }

        .nav-item {
            border: 1px solid var(--accent-purple);
            padding: 5px 25px;
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: rgba(128, 0, 128, 0.2);
            box-shadow: 0 0 10px var(--accent-purple);
        }


        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

    
        .window {
            background: var(--win-bg);
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-bottom: 2px solid #000;
            border-right: 2px solid #000;
            width: 90%;
            max-width: 700px;
            padding: 1px;
            position: relative;
        }

        .title-bar {
            background: var(--win-blue);
            color: white;
            padding: 3px 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }

        .close-btn {
            background: var(--win-bg);
            color: black;
            border: 1px solid #000;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
        }

        .window-content {
            padding: 30px;
            background: repeating-linear-gradient(
                0deg,
                #999,
                #999 1px,
                #b0b0b0 1px,
                #b0b0b0 2px
            );
            color: #000;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            text-transform: uppercase;
            font-size: 1.6rem;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-top: 3px solid #444;
            border-left: 3px solid #444;
            border-bottom: 3px solid var(--win-border-light);
            border-right: 3px solid var(--win-border-light);
            padding: 12px;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            outline: none;
            color: #000;
        }

        input::placeholder, textarea::placeholder {
            color: #666;
            opacity: 0.7;
        }

        .btn-transmit {
            background: var(--win-bg);
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-bottom: 2px solid #000;
            border-right: 2px solid #000;
            padding: 5px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000;
        }

        .btn-transmit:active {
            box-shadow: none;
            transform: translate(1px, 1px);
        }


        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--win-bg);
            border: 2px solid var(--win-border-dark);
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            padding: 5px 15px;
            color: #000;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.8);
        }

        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 15px;
        }

        .bar {
            width: 3px;
            background: var(--win-blue);
            animation: bounce 0.5s infinite ease-in-out alternate;
        }

        @keyframes bounce {
            from { height: 3px; }
            to { height: 15px; }
        }


        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="grid-overlay"></div>


    <nav class="top-nav">
        <a href="index.html" class="nav-item">/START</a>
        <a href="list.html" class="nav-item">/INFO</a>
        <a href="nav.html" class="nav-item">/WORK</a>
        <a href="form.html" class="nav-item">/MAIL</a>
    </nav>


    <div class="window">
        <div class="title-bar">
            <span>C:\NETWORK\OUTLOOK_EXPRESS.EXE</span>
            <div class="close-btn">X</div>
        </div>
        
        <div class="window-content">
            <form onsubmit="handleS ubmit(event)">
                <div class="form-group">
                    <label>FROM:</label>
                    <input type="text" placeholder="Your_Name_Here" required>
                </div>

                <div class="form-group">
                    <label>SUBJECT:</label>
                    <input type="text" placeholder="Inquiry / Collaboration" required>
                </div>

                <div class="form-group">
                    <label>MESSAGE_BODY:</label>
                    <textarea rows="5" placeholder="Write your transmission..." required></textarea>
                </div>

                <button type="submit" class="btn-transmit">
                    TRANSMIT_DATA
                </button>
            </form>
        </div>
    </div>


    <div class="music-player">
        <div class="visualizer">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
        </div>
        <span>PLAYING: Y2K VIBES.MP3</span>
        <span style="margin-left: 5px;">▶</span>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            
            btn.innerText = "TRANSMITTING...";
            btn.disabled = true;

            setTimeout(() => {
                btn.innerText = "DATA_SENT_OK";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    e.target.reset();
                }, 2000);
            }, 1500);
        }
    </script>
</body>
</html>
